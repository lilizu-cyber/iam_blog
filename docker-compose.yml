services:
  # EventStore Database
  eventstore:
    image: eventstore/eventstore:21.10.9-buster-slim
    platform: linux/amd64
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_EXT_TCP_PORT=1113
      - EVENTSTORE_HTTP_PORT=2113
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_ENABLE_EXTERNAL_TCP=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
    ports:
      - "1113:1113"
      - "2113:2113"
    volumes:
      - eventstore-volume-data:/var/lib/eventstore
      - eventstore-volume-logs:/var/log/eventstore
    networks:
      - iam-blog-network

  # PostgreSQL for Read Models and Event Store
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_blog_db
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - iam-blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Caching and Session Management
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - iam-blog-network

  # Application Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=development
      - PORT=3001
      - POSTGRESQL_URI=postgresql://postgres:postgres@postgresql:5432/iam_blog_db
      - EVENTSTORE_CONNECTION_STRING=esdb://eventstore:2113?tls=false
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgresql:
        condition: service_healthy
      eventstore:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    networks:
      - iam-blog-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_WS_URL=ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - iam-blog-network

volumes:
  eventstore-volume-data:
  eventstore-volume-logs:
  postgresql-data:
  redis-data:

networks:
  iam-blog-network:
    driver: bridge

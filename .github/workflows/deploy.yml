name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      run_migrations:
        description: 'Run database migrations before deployment?'
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run database migrations
        if: inputs.run_migrations
        env:
          POSTGRESQL_URI: ${{ secrets[format('POSTGRESQL_URI_{0}', inputs.environment)] }}
          NODE_ENV: ${{ inputs.environment }}
        run: |
          echo "Running migrations for ${{ inputs.environment }}..."
          npm run migrate:up
      
      - name: Build application
        run: |
          npm run build:backend
          cd frontend
          # Use npm install to ensure optional dependencies (Rollup native modules) are installed
          # npm ci sometimes skips optional dependencies due to npm bug
          npm install
          npm run build
      
      - name: Deploy to server
        # This step depends on your deployment method
        # Examples: SSH, Docker, Cloud Platform, etc.
        run: |
          echo "Deployment steps would go here"
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          echo "Example deployment methods:"
          echo "1. SSH deployment:"
          echo "   - Copy files to server"
          echo "   - Restart services"
          echo ""
          echo "2. Docker deployment:"
          echo "   - Build Docker image"
          echo "   - Push to registry"
          echo "   - Deploy to container platform"
          echo ""
          echo "3. Cloud platform (Vercel, Netlify, etc.):"
          echo "   - Use platform-specific deployment actions"
      

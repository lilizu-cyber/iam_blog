name: CI - Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Lint and Code Quality
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting (if configured)
        run: |
          echo "Linting checks would run here"
          # Add ESLint or other linting tools if needed
          # npm run lint

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # Job 3: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iam_blog_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup test environment
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
        run: |
          # Create .env.test file
          echo "POSTGRESQL_URI=postgresql://postgres:postgres@localhost:5432/iam_blog_db_test" > .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "JWT_SECRET=test-jwt-secret-for-ci" >> .env.test
      
      - name: Run database migrations
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
        run: npm run migrate:up
      
      - name: Run integration tests
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
        run: npm run test:integration

  # Job 4: Security Tests
  security-tests:
    name: Security & Sanitization Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run sanitization tests
        run: npm run test:sanitization
      
      - name: Test security headers
        run: |
          # Start backend server in background
          npm run dev:backend &
          sleep 10
          # Run security headers test
          npm run test:security-headers || true
          # Stop background process
          pkill -f "node.*server.js" || true

  # Job 5: E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iam_blog_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Setup test environment
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
        run: |
          echo "POSTGRESQL_URI=postgresql://postgres:postgres@localhost:5432/iam_blog_db_test" > .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "JWT_SECRET=test-jwt-secret-for-ci" >> .env.test
      
      - name: Run database migrations
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
        run: npm run migrate:up
      
      - name: Start backend server
        env:
          POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          PORT: 3001
        run: |
          npm run dev:backend &
          sleep 15
      
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      
      - name: Start frontend server
        run: |
          cd frontend
          npx serve -s build -l 3000 &
          sleep 5
      
      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: npm run test:e2e
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Job 6: Build Check
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build backend
        run: npm run build:backend
      
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build


name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iam_blog_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install frontend dependencies
      run: |
        cd frontend
        echo "Installing frontend dependencies..."
        # Use npm install to ensure optional dependencies (Rollup native modules) are installed
        # npm ci sometimes skips optional dependencies due to npm bug
        npm install
        echo "✅ Frontend dependencies installed successfully"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Install serve (for frontend)
      run: npm install -g serve

    - name: Setup database
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
        NODE_ENV: test
      run: |
        npm run setup:db
        npm run create:admin

    - name: Build frontend
      env:
        NODE_ENV: production
      run: |
        cd frontend
        echo "Building frontend..."
        npm run build
        echo "Frontend build completed successfully"
        ls -la build || echo "Build directory not found"

    - name: Create .env file for backend
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
        NODE_ENV: test
      run: |
        cat > .env << EOF
        POSTGRESQL_URI=postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL=postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET=test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL=redis://localhost:6379
        NODE_ENV=test
        PORT=3001
        EOF

    - name: Start backend server
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
        NODE_ENV: test
        PORT: 3001
      run: |
        npm run dev:backend &
        sleep 15
        # Verify backend is running
        curl -f http://localhost:3001/health || exit 1

    - name: Start frontend server
      run: |
        cd frontend
        npx serve -s build -l 3000 &
        sleep 5
        # Verify frontend is running
        curl -f http://localhost:3000 || exit 1

    - name: Run E2E tests
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
        ADMIN_USERNAME: admin
        ADMIN_PASSWORD: Schlurfend.?.123
        FRONTEND_URL: http://localhost:3000
        CI: true
      run: npm run test:e2e

    - name: List test artifacts
      if: always()
      run: |
        echo "Checking for Playwright reports..."
        ls -la playwright-report/ 2>/dev/null || echo "playwright-report/ directory not found"
        echo "Checking for test results..."
        ls -la test-results/ 2>/dev/null || echo "test-results/ directory not found"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
        if-no-files-found: warn

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30




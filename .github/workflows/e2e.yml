name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iam_blog_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup database
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
      run: |
        npm run setup:db
        npm run create:admin

    - name: Build frontend
      run: cd frontend && npm ci && npm run build

    - name: Run E2E tests
      env:
        POSTGRESQL_URI: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iam_blog_db
        JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-characters-long
        REDIS_URL: redis://localhost:6379
        ADMIN_USERNAME: admin
        ADMIN_PASSWORD: Schlurfend.?.123
        FRONTEND_URL: http://localhost:3000
      run: npm run test:e2e

    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30


